<svg width="44" height="44" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Primary gradient: light indigo → indigo → deep indigo, diagonal -->
    <linearGradient id="grad" x1="0" y1="0" x2="44" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="45%"  stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <!-- Shine overlay: top-to-bottom white fade -->
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="white" stop-opacity="0.13"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Clip path: 3 panel shapes (2 top + 1 full-width bottom) -->
    <clipPath id="panels">
      <rect x="0"  y="0"  width="20" height="19" rx="3.5"/>
      <rect x="24" y="0"  width="20" height="19" rx="3.5"/>
      <rect x="0"  y="23" width="44" height="21" rx="4"/>
    </clipPath>
  </defs>

  <!-- Base gradient fill clipped to panel shapes -->
  <rect width="44" height="44" fill="url(#grad)"  clip-path="url(#panels)"/>
  <!-- Shine overlay -->
  <rect width="44" height="44" fill="url(#shine)" clip-path="url(#panels)"/>

  <!-- Terminal cursor detail in bottom panel -->
  <!-- Prompt line -->
  <rect x="6.5" y="34.5" width="9"   height="1.25" rx="0.6"  fill="white" fill-opacity="0.30" clip-path="url(#panels)"/>
  <!-- Cursor block -->
  <rect x="17"  y="34"   width="2.5" height="2"    rx="0.5"  fill="white" fill-opacity="0.45" clip-path="url(#panels)"/>
  <!-- Active indicator dot on top-right panel -->
  <circle cx="37.5" cy="4.5" r="1.5" fill="white" fill-opacity="0.40" clip-path="url(#panels)"/>
</svg>
